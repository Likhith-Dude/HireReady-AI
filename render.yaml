services:
  - type: web
    name: hireready-api
    runtime: python
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./hireready.db
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://hire-ready-ai-ten.vercel.app,https://hireready-api-cifu.onrender.com,http://localhost:3000
      - key: GROQ_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
